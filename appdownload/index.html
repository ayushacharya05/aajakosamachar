<!DOCTYPE html>
<html lang="en">
<head>

    <title>Aajako Samachar - Download Now</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            max-width: 450px;
            width: 90%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 28px;
            color: #d32f2f; /* News Red */
        }
        p.tagline {

            font-size: 16px;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .description {
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .download-btn:hover {
            background: #000;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }

<div class="container">
