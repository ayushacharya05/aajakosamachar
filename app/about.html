<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>About - आजको समाचार</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { 
      --primary-color: #0052D4; 
      --surface-light: #F2F4F7; 
      --card-bg-light: #FFFFFF; 
      --text-main-light: #1A1C1E; 
      --surface-dark: #0E1113; 
      --card-bg-dark: #1C1F26;
      --accent-gold: #FFD700;
    }

    body { 
      background: var(--surface-light); 
      font-family: 'Outfit', sans-serif; 
      color: var(--text-main-light); 
      padding-bottom: 110px; 
      transition: background 0.3s;
    }

    .app-header { 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(20px); 
      position: sticky; 
      top: 0; 
      z-index: 1050; 
      padding: 14px 20px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid rgba(0,0,0,0.08); 
    }

    .brand-name { font-family: 'Mukta', sans-serif; font-weight: 800; font-size: 1.6rem; margin: 0; color: inherit; }

    .content-card { 
      margin: 25px 16px; 
      padding: 35px 20px; 
      background: var(--card-bg-light); 
      border-radius: 28px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
      text-align: center; 
      border: 1px solid rgba(0,0,0,0.02);
    }

    /* --- MATCHING FLOATING BOTTOM NAV --- */
    .bottom-nav { 
        position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px;
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
        display: flex; justify-content: space-around; align-items: center; 
        border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); 
        z-index: 1030; border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .nav-item { 
        position: relative; color: #888; text-decoration: none;
        display: flex; flex-direction: column; align-items: center;
        transition: all 0.3s ease; flex: 1;
    }
    .nav-item i { font-size: 1.3rem; margin-bottom: 2px; }
    .nav-item span { font-size: 0.72rem; font-weight: 600; font-family: 'Mukta', sans-serif; }
    
    /* Active State (showing Home as active since we're on a sub-page usually linked from there) */
    .nav-item.active { color: var(--primary-color); }
    .nav-item.active i { transform: translateY(-5px); }

    /* Dark Mode Styles */
    body.dark-mode { background: var(--surface-dark); color: #E2E2E6; }
    .dark-mode .app-header { background: var(--card-bg-dark); border-color: #333; }
    .dark-mode .content-card { background: var(--card-bg-dark); border-color: #333; }
    .dark-mode .bottom-nav { background: rgba(28, 31, 38, 0.9); border-color: rgba(255, 255, 255, 0.05); }
    .dark-mode .nav-item { color: #71767b; }
    .dark-mode .nav-item.active { color: #fff; }

  </style>
</head>
<body>

  <header class="app-header">
    <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-arrow-left fa-lg"></i></a>
    <h1 class="brand-name">आजको समाचार</h1>
    <div style="width: 24px;"></div> </header>

  <div class="container">
    <div class="content-card">
      <i class="fas fa-info-circle fa-3x mb-4" style="color:var(--primary-color)"></i>
      <h2 class="fw-bold mb-4" style="font-family: 'Mukta';">हाम्रो बारेमा</h2>
      <p style="font-family: 'Mukta'; font-size: 1.1rem; line-height: 1.7;">
        आजको समाचार नेपाली पाठकहरूका लागि तयार पारिएको एक सफा र सरल न्यूज एग्रिगेटर हो।
      </p>
      <p style="font-family: 'Mukta'; font-size: 1.1rem; line-height: 1.7;">
        हामी विभिन्न विश्वसनीय स्रोतहरूबाट समाचार संकलन गरी एउटै ठाउँमा प्रस्तुत गर्छौं। हाम्रो उद्देश्य पाठकलाई झन्झटमुक्त समाचार पढ्ने अनुभव प्रदान गर्नु हो।
      </p>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fas fa-house"></i>
      <span>होम</span>
    </a>
    <a href="index.html" class="nav-item">
      <i class="fas fa-grip-vertical"></i>
      <span>विधा</span>
    </a>
    <a href="index.html" class="nav-item">
      <i class="fas fa-fire-alt"></i>
      <span>ताजा</span>
    </a>
    <a href="index.html" class="nav-item">
      <i class="fas fa-bookmark"></i>
      <span>सेभ</span>
    </a>
  </nav>

  <script>
    // Sync Dark Mode with Main Page
    if(localStorage.getItem('theme') === 'dark' || document.body.classList.contains('dark-mode')) {
        document.body.classList.add('dark-mode');
    }
  </script>
</body>
</html>
