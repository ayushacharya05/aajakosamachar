
<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>आजको समाचार</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --primary-color: #0052D4; 
      --surface-light: #F2F4F7; 
      --card-bg-light: #FFFFFF;
      --text-main-light: #1A1C1E; 
      --surface-dark: #0E1113; 
      --card-bg-dark: #1C1F26;
    }

    #splashScreen { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: #ffffff; z-index: 9999; display: flex; 
        flex-direction: column; justify-content: center; align-items: center; 
    }
    #splashScreen img { width: 150px; animation: logoEntrance 1.5s ease-in-out forwards; }
    @keyframes logoEntrance { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.1); opacity: 0; } }
    
    body { background: var(--surface-light); font-family: 'Outfit', sans-serif; color: var(--text-main-light); padding-bottom: 100px; transition: background 0.3s; overflow-x: hidden; }
    .app-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1040; padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
    .brand-name { font-family: 'Mukta', sans-serif; font-weight: 800; font-size: 1.6rem; margin: 0; }

    #newsCarousel { margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: none; }
    .carousel-item { height: 260px; background: #000; cursor: pointer; }
    .carousel-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.75; }
    .carousel-caption { text-align: left; left: 0; right: 0; bottom: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 25px 15px 15px 15px; width: 100%; margin: 0; }
    .carousel-caption h5 { font-family: 'Mukta'; font-weight: 700; font-size: 1.15rem; margin-bottom: 5px; line-height: 1.3; color: #fff; }

    #categorySection { padding: 20px; display: none; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .cat-tile { background: var(--card-bg-light); border-radius: 16px; padding: 25px 10px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }

    .offcanvas { width: 280px !important; border: none !important; }
    .nav-link-custom { padding: 15px 20px; border-radius: 12px; color: inherit; text-decoration: none; display: flex; align-items: center; margin-bottom: 5px; font-weight: 500; }
    .nav-link-custom i { width: 35px; color: var(--primary-color); font-size: 1.2rem; }

    /* Updated Taja Card */
    .taja-card { background: var(--card-bg-light); padding: 15px; border-radius: 18px; margin-bottom: 15px; display: flex; gap: 15px; border-left: 4px solid var(--primary-color); box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; align-items: center; }
    .taja-source { font-size: 0.7rem; color: var(--primary-color); font-weight: 800; min-width: 85px; text-align: center; background: rgba(0, 82, 212, 0.1); border-radius: 8px; padding: 6px 4px; height: fit-content; text-transform: uppercase; }
    .taja-title { font-family: 'Mukta'; font-weight: 600; font-size: 1.05rem; line-height: 1.4; }

    .bottom-nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); z-index: 1030; border: 1px solid rgba(255, 255, 255, 0.3); }
    .nav-item { color: #888; text-decoration: none; display: flex; flex-direction: column; align-items: center; flex: 1; border: none; background: none; }
    .nav-item.active { color: var(--primary-color); }
    .nav-item i { font-size: 1.3rem; }
    .nav-item span { font-size: 0.72rem; font-weight: 600; font-family: 'Mukta'; }

    #newsReader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg-light); z-index: 2000; display: none; overflow-y: auto; }
    .reader-header { position: sticky; top: 0; background: var(--card-bg-light); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 2001; }
    
    .dark-mode { background: var(--surface-dark); color: white; }
    .dark-mode .app-header, .dark-mode #newsReader, .dark-mode .cat-tile, .dark-mode .taja-card, .dark-mode .offcanvas, .dark-mode .news-card { background: var(--card-bg-dark) !important; color: white !important; }
    .dark-mode .bottom-nav { background: rgba(28, 31, 38, 0.9) !important; }
    .dark-mode .taja-source { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .news-card { background: #fff; }
  </style>
</head>
<body onload="initApp()">

  <div id="splashScreen">
    <img src="https://raw.githubusercontent.com/ayushacharya05/aajakosamachar/main/images/icon.png" alt="Logo">
  </div>

  <header class="app-header">
    <div onclick="openMenu()" style="cursor:pointer"><i class="fas fa-bars-staggered fa-lg"></i></div>
    <h1 class="brand-name">आजको समाचार</h1>
    <div onclick="toggleDarkMode()" style="cursor:pointer"><i id="darkModeIcon" class="fas fa-moon fa-lg"></i></div>
  </header>

  <main class="container-fluid p-0">
    <div id="newsCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner" id="carouselContent"></div>
    </div>
    <div id="categorySection" class="container">
        <div class="cat-tile" onclick="filterByTopic('All')"><i class="fas fa-th-large mb-2 text-primary fs-2"></i><br><span>सबै</span></div>
        <div class="cat-tile" onclick="filterByTopic('Politics')"><i class="fas fa-landmark mb-2 text-primary fs-2"></i><br><span>राजनीति</span></div>
        <div class="cat-tile" onclick="filterByTopic('Sports')"><i class="fas fa-trophy mb-2 text-primary fs-2"></i><br><span>खेलकुद</span></div>
        <div class="cat-tile" onclick="filterByTopic('Tech')"><i class="fas fa-microchip mb-2 text-primary fs-2"></i><br><span>प्रविधि</span></div>
        <div class="cat-tile" onclick="filterByTopic('Entertainment')"><i class="fas fa-film mb-2 text-primary fs-2"></i><br><span>मनोरञ्जन</span></div>
        <div class="cat-tile" onclick="filterByTopic('Economy')"><i class="fas fa-chart-line mb-2 text-primary fs-2"></i><br><span>अर्थतन्त्र</span></div>
    </div>
    <div id="newsContainer" class="container pt-2"></div>
  </main>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header"><h5 class="brand-name">मेनु</h5><button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body p-0">
      <a href="https://aajakosamachar.ayushacharya5.com.np/app/about.html" class="nav-link-custom mx-3"><i class="fas fa-info-circle"></i> हाम्रो बारेमा</a>
      <a href="https://aajakosamachar.ayushacharya5.com.np/app/support.html" class="nav-link-custom mx-3"><i class="fas fa-headset"></i> सहयोग</a>
    </div>
  </div>

  <div id="newsReader">
    <div class="reader-header">
      <button class="btn border-0 rounded-circle me-2" onclick="window.history.back()"><i class="fas fa-arrow-left fs-5"></i></button>
      <span class="fw-bold flex-grow-1">पढ्नुहोस्</span>
      <button class="btn border-0" id="saveBtnInReader" onclick="toggleSaveCurrent()"><i id="bookmarkIcon" class="far fa-bookmark fs-4"></i></button>
    </div>
    <div class="reader-content p-3">
      <h2 id="rTitle" class="fw-bold mb-3" style="font-family:'Mukta'"></h2>
      <img id="rImg" class="w-100 rounded mb-3" src="" style="display:none">
      <div id="rBody" style="font-family:'Mukta'; font-size:1.15rem; line-height:1.8; white-space: pre-wrap;"></div>
      <a id="rLink" href="" target="_blank" class="btn btn-primary w-100 mt-4 py-3 rounded-pill fw-bold">पूरा स्रोतमा पढ्नुहोस्</a>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="homeTab" onclick="loadNews()"><i class="fas fa-house"></i><span>होम</span></button>
    <button class="nav-item" id="catTab" onclick="showCategoryMenu()"><i class="fas fa-grip-vertical"></i><span>विधा</span></button>
    <button class="nav-item" id="tajaTab" onclick="showTaja()"><i class="fas fa-fire-alt"></i><span>ताजा</span></button>
    <button class="nav-item" id="saveTab" onclick="renderSaved()"><i class="fas fa-bookmark"></i><span>सेभ</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
     const feeds = [
      { name: "OnlineKhabar", url: "https://www.onlinekhabar.com/feed" },
      { name: "Setopati", url: "https://setopati.com/feed" },
      { name: "Ratopati", url: "https://www.ratopati.com/feed" },
      { name: "Kantipur", url: "https://ekantipur.com/rss/news" },
      { name: "TechPana", url: "https://www.techpana.com/feed" },
      { name: "BBC Nepali", url: "https://www.bbc.co.uk/nepali/index.xml" },
      { name: "Our Biratnagar", url: "https://ourbiratnagar.net/feed" },
      { name: "Nepal Press", url: "https://www.nepalpress.com/feed" },
      { name: "Himal Khabar", url: "https://www.himalkhabar.com/rss" },
      { name: "Nepal News", url: "https://nepalnews.com/rss" },
      { name: "Image Khabar", url: "https://www.imagekhabar.com/feed" },
      { name: "Annapurna Post", url: "https://annapurnapost.com/rss" },
      { name: "DC Nepal", url: "https://www.dcnepal.com/feed" },
      { name: "Nepal Khabar", url: "https://nepalkhabar.com/rss" },
         { name: "ICT frame", url: "https://np.ictframe.com/rss" },
         { name: "Technology Khabar", url: "https://www.technologykhabar.com/rss" },
          { name: "News filmy", url: "https://newsfilmy.com/rss" },
            { name: "Nepali Paisa", url: "https://nepalipaisa.com/rss" },
            { name: "Ramailo Cha", url: "https://www.ramailo6.com/rss" },
              { name: "Bizmandu", url: "https://bizmandu.com/rss" },
     { name: "Routine Of Nepal Banda ", url: "https://www.ronbpost.com/rss" },


    ];

    let allNews = [], currentNewsItem = null, sidebarInstance = null;

    function cleanSourceName(name) {
        const n = name.toLowerCase();
        if (n.includes('onlinekhabar')) return 'अनलाइनखबर';
        if (n.includes('setopati')) return 'सेतोपाटी';
        if (n.includes('ratopati')) return 'रातोपाटी';
        if (n.includes('nepalkhabar')) return 'नेपालखबर';
        if (n.includes('ourbiratnagar') || n.includes('biratnagar')) return 'हाम्रो विराटनगर';
        if (n.includes('kantipur')) return 'कान्तिपुर';
        let parts = name.split(' ');
        return parts.length > 1 ? parts[0] + ' ' + parts[1] : parts[0];
    }

    function initApp() {
      sidebarInstance = new bootstrap.Offcanvas(document.getElementById('sidebarMenu'));
      window.onpopstate = () => { document.getElementById('newsReader').style.display = 'none'; };
      setTimeout(() => { document.getElementById('splashScreen').style.display = 'none'; loadNews(); }, 1500);
    }

    function getImageUrl(item) { return item.thumbnail || item.enclosure?.link || (item.description?.match(/<img[^>]+src="([^">]+)"/)?.[1]) || null; }

    async function loadNews() {
      setActiveTab('homeTab'); toggleView('news');
      const container = document.getElementById('newsContainer');
      container.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary"></div></div>';
      try {
        const results = await Promise.all(feeds.map(f => fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}`).then(r => r.json())));
        allNews = results.flatMap(data => (data.items || []).map(item => ({...item, sourceName: cleanSourceName(data.feed.title || data.feed.name), topic: getTopic(item.title)})));
        allNews.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
        const newsWithImages = allNews.filter(n => getImageUrl(n));
        document.getElementById('newsCarousel').style.display = 'block';
        document.getElementById('carouselContent').innerHTML = newsWithImages.slice(0, 5).map((item, idx) => `
            <div class="carousel-item ${idx === 0 ? 'active' : ''}" onclick='openReader(${JSON.stringify(item).replace(/'/g, "&apos;")})'><img src="${getImageUrl(item)}"><div class="carousel-caption"><h5>${item.title}</h5></div></div>`).join('');
        renderList(allNews.slice(5));
      } catch (e) { container.innerHTML = "विवरण लोड भएन।"; }
    }

    function renderList(list) {
      document.getElementById('newsContainer').innerHTML = list.map(item => `
        <div class="news-card border-0 shadow-sm mb-3 rounded-4 overflow-hidden" style="cursor:pointer" onclick='openReader(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
          ${getImageUrl(item) ? `<img src="${getImageUrl(item)}" class="w-100" style="height:200px; object-fit:cover;">` : ''}
          <div class="p-3"><span class="badge bg-primary mb-2">${item.sourceName}</span><div class="fw-bold" style="font-family:'Mukta'; font-size:1.15rem;">${item.title}</div></div>
        </div>`).join('');
    }

    function openReader(item) {
      currentNewsItem = item;
      history.pushState({page: 'reader'}, '');
      document.getElementById('rTitle').innerText = item.title;
      document.getElementById('rImg').src = getImageUrl(item) || '';
      document.getElementById('rImg').style.display = getImageUrl(item) ? 'block' : 'none';
      let temp = document.createElement("div"); temp.innerHTML = item.content || item.description || "";
      document.getElementById('rBody').innerText = temp.textContent || temp.innerText;
      document.getElementById('rLink').href = item.link;
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      const isSaved = saved.some(n => n.link === item.link);
      document.getElementById('bookmarkIcon').className = isSaved ? 'fas fa-bookmark fs-4 text-primary' : 'far fa-bookmark fs-4';
      document.getElementById('newsReader').style.display = 'block';
    }

    function toggleSaveCurrent() {
      if (!currentNewsItem) return;
      let saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      const index = saved.findIndex(n => n.link === currentNewsItem.link);
      if (index > -1) { saved.splice(index, 1); document.getElementById('bookmarkIcon').className = 'far fa-bookmark fs-4'; } 
      else { saved.push(currentNewsItem); document.getElementById('bookmarkIcon').className = 'fas fa-bookmark fs-4 text-primary'; }
      localStorage.setItem('savedNews', JSON.stringify(saved));
    }

    function renderSaved() {
      setActiveTab('saveTab'); toggleView('news');
      document.getElementById('newsCarousel').style.display = 'none';
      document.getElementById('categorySection').style.display = 'none';
      const saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
      if (saved.length === 0) { document.getElementById('newsContainer').innerHTML = '<div class="text-center p-5 opacity-50">कुनै समाचार सेभ गरिएको छैन।</div>'; } 
      else { renderList(saved); }
    }

    function showTaja() {
      setActiveTab('tajaTab'); toggleView('news');
      document.getElementById('newsCarousel').style.display = 'none';
      document.getElementById('categorySection').style.display = 'none';
      // UPDATED: Now shows Source Name instead of Time
      document.getElementById('newsContainer').innerHTML = allNews.slice(0, 30).map(item => {
        return `<div class="taja-card" onclick='openReader(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                  <div class="taja-source">${item.sourceName}</div>
                  <div class="taja-title">${item.title}</div>
                </div>`;
      }).join('');
    }

    function getTopic(t) { 
        if (/खेल|क्रिकेट|फुटबल/i.test(t)) return 'Sports'; 
        if (/राजनीति|नेता|सरकार/i.test(t)) return 'Politics'; 
        if (/प्रविधि|मोबाइल|इन्टरनेट/i.test(t)) return 'Tech'; 
        if (/फिल्म|मनोरञ्जन|कलाकार/i.test(t)) return 'Entertainment'; 
        if (/बैंक|अर्थ|बजार|शेयर/i.test(t)) return 'Economy'; 
        return 'General'; 
    }

    function toggleView(v) { 
        document.getElementById('categorySection').style.display = (v === 'category') ? 'grid' : 'none'; 
        document.getElementById('newsContainer').style.display = (v === 'news') ? 'block' : 'none'; 
    }

    function showCategoryMenu() { setActiveTab('catTab'); toggleView('category'); document.getElementById('newsCarousel').style.display = 'none'; }
    function filterByTopic(topic) { setActiveTab('catTab'); toggleView('news'); const filtered = (topic === 'All') ? allNews : allNews.filter(n => n.topic === topic); renderList(filtered); }
    function setActiveTab(id) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); document.getElementById('darkModeIcon').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun fa-lg' : 'fas fa-moon fa-lg'; }
    function openMenu() { sidebarInstance.show(); }
  </script>
</body>
</html>
